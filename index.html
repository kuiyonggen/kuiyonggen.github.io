<style>
    .image-gallery {display: flex; flex-wrap: wrap; overflow: auto; margin-left: -1%!important;}
    .image-gallery li {float: left; display: block; margin: 0 0 1% 1%; width: 19%;}
    .image-gallery li a {text-align: center; text-decoration: none!important; }
    .image-gallery li a span {display: block; text-overflow: ellipsis; overflow: hidden; white-space: nowrap; padding: 3px 0;}
    .image-gallery li a img {width: 100%; display: block;}

  <ui class="image-gallery">
<script>
    blogs.forEach((b) => {
          document.write('<li>') 
          document.write('<a target="_blank" href="' + b.blogUrl + '">')

              document.write('<img src="' + b.picUrl + '" alt="' + b.title + '" width="300" class="blog-banner">')
            document.write('</a>')

            document.write('<div class="blog-content">')

              document.write('<a href="#" class="blog-category">' + b.category + '</a>')

              document.write('<a target="_blank" href="' + b.blogUrl + '">')
                document.write('<h3 class="blog-title">' + b.title + '</h3>')
              document.write('</a>')

              document.write('<p class="blog-meta">')
              document.write('作者:  <cite>' + b.author + '</cite> / <time datetime="' + b.createTime + '">' + b.createTime + '</time>')
              document.write('</p>')

              document.write(' </div>')
              document.write(' </li>')
    })
</script>
